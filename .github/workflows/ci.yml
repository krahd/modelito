name: CI

on:
  push:
    branches: [ main, fix/ollama-compat ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_ollama_integration:
        description: 'Run the Ollama integration job (yes to run)'
        required: false
        default: 'no'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r dev-requirements.txt || true
      - name: Run mypy
        run: mypy modelito --ignore-missing-imports
      - name: Run tests
        run: pytest -q

  integration:
    if: ${{ github.event.inputs.run_ollama_integration == 'yes' || env.RUN_OLLAMA_INTEGRATION == '1' }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r dev-requirements.txt || true
      - name: Run Ollama integration tests
        run: pytest tests/test_ollama_integration.py -q
        env:
          RUN_OLLAMA_INTEGRATION: ${{ env.RUN_OLLAMA_INTEGRATION }}
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r dev-requirements.txt
      - name: Run tests
        run: |
          pytest -q
