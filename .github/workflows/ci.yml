name: CI

on:
  push:
    branches: [ main, fix/ollama-compat, 'ci/**', 'fix/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_ollama_integration:
        description: 'Run the Ollama integration job (yes to run)'
        required: false
        default: 'no'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt || true
          pip install ruff
      - name: Run ruff
        run: ruff check . || true
      - name: Run mypy
        run: mypy modelito --ignore-missing-imports || true

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt','**/dev-requirements.txt','**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install -r dev-requirements.txt || true
      - name: Run mypy
        if: matrix.os != 'windows-latest'
        run: mypy modelito --ignore-missing-imports || true
      - name: Run package tests
        run: pytest tests -q

  integration:
    if: ${{ github.event.inputs.run_ollama_integration == 'yes' || github.event.inputs.run_ollama_integration == '1' }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install -r dev-requirements.txt || true
      - name: Run Ollama integration tests
        run: pytest tests/test_ollama_integration.py -q
        env:
          RUN_OLLAMA_INTEGRATION: ${{ env.RUN_OLLAMA_INTEGRATION }}

  docs:
    name: Docs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
      - name: Build docs
        run: bash docs/build_docs.sh
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/build
