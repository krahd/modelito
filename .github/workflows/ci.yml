name: CI

on:
  push:
    branches: [ main, fix/ollama-compat, 'ci/**', 'fix/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_ollama_integration:
        description: 'Run the Ollama integration job (yes to run)'
        required: false
        default: 'no'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run legacy-dict check
        run: python scripts/check_no_legacy_dicts.py
      - name: Run ruff
        run: ruff check .
      - name: Run mypy
        run: mypy modelito --ignore-missing-imports

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt','**/dev-requirements.txt','**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install optional dev requirements
        continue-on-error: true
        run: |
          if [ -f dev-requirements.txt ]; then python -m pip install -r dev-requirements.txt; else echo "no dev-requirements"; fi
      - name: Run mypy
        if: matrix.os != 'windows-latest'
        run: mypy modelito --ignore-missing-imports
        continue-on-error: true
      - name: Run package tests (unit)
        run: |
          # Run only non-integration tests in the unit CI job. Integration
          # tests are executed separately in gated workflows.
          pytest -q -m 'not integration' tests

  integration:
    if: ${{ github.event.inputs.run_ollama_integration == 'yes' || github.event.inputs.run_ollama_integration == '1' }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install optional dev requirements
        continue-on-error: true
        run: |
          if [ -f dev-requirements.txt ]; then python -m pip install -r dev-requirements.txt; else echo "no dev-requirements"; fi
      - name: Run Ollama integration tests
        run: |
          if [ -n "${OLLAMA_HOST}" ] || [ "${{ github.event.inputs.run_ollama_integration }}" = "yes" ] || [ "${{ github.event.inputs.run_ollama_integration }}" = "1" ]; then
            pytest tests/test_ollama_integration.py -q
          else
            echo "Skipping Ollama integration tests (no OLLAMA_HOST configured)"
          fi
        env:
          RUN_OLLAMA_INTEGRATION: ${{ env.RUN_OLLAMA_INTEGRATION }}
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
          OLLAMA_PORT: ${{ secrets.OLLAMA_PORT }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
      - name: Build docs
        run: bash docs/build_docs.sh
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/build

  integration-gated:
    name: Integration (gated)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        provider: [openai, anthropic, ollama]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Install optional dev requirements
        continue-on-error: true
        run: |
          if [ -f dev-requirements.txt ]; then python -m pip install -r dev-requirements.txt; else echo "no dev-requirements"; fi

      - name: OpenAI integration tests
        run: |
          if [ -n "${OPENAI_API_KEY}" ]; then
            pytest tests/integration/test_integration_openai_stream.py -q
          else
            echo "Skipping OpenAI tests (no OPENAI_API_KEY)"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Anthropic integration tests
        run: |
          if [ -n "${ANTHROPIC_API_KEY}" ]; then
            pytest tests/integration/test_integration_anthropic_stream.py -q
          else
            echo "Skipping Anthropic tests (no ANTHROPIC_API_KEY)"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Ollama integration tests
        run: |
          if [ "${{ matrix.provider }}" = "ollama" ] && ( [ "${{ github.event.inputs.run_ollama_integration }}" = "yes" ] || [ "${{ github.event.inputs.run_ollama_integration }}" = "1" ] || [ "${RUN_OLLAMA_INTEGRATION}" = "1" ] ) && [ -n "${OLLAMA_HOST}" ]; then
            pytest tests/integration/test_integration_ollama_stream.py -q
          else
            echo "Skipping Ollama integration tests"
          fi
        env:
          RUN_OLLAMA_INTEGRATION: ${{ env.RUN_OLLAMA_INTEGRATION }}
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
          OLLAMA_PORT: ${{ secrets.OLLAMA_PORT }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
