name: Integration — Ollama (self-hosted)

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ollama-integration:
    name: Ollama integration (self-hosted)
    # Only run on self-hosted runners to avoid ad-hoc installs on hosted runners
    runs-on: [self-hosted, linux]
    timeout-minutes: 120
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'run-integration')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run Ollama integration tests
        env:
          # Ensure installers that check env flags are disabled by default
          ALLOW_OLLAMA_INSTALL: '0'
        run: |
          pytest tests/integration/test_integration_ollama_stream.py -q
